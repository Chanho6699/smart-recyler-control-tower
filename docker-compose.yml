services:
  mysql:
    image: mysql:8.0
    container_name: smart-recycler-mysql
    ports:
      - "3308:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: smart_recycler
      MYSQL_USER: recycler
      MYSQL_PASSWORD: recycler
    volumes:
      - mysql-data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci

  redis:
    image: redis:7.2
    container_name: smart-recycler-redis
    ports:
      - "6379:6379"

volumes:
  mysql-data:
